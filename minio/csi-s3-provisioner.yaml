apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: csi-s3-provisioner
  namespace: kube-system
  labels:
    app: csi-s3-provisioner
spec:
  serviceName: csi-provisioner-s3
  replicas: 1
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10

  selector:
    matchLabels:
      app: csi-s3-provisioner

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain

  updateStrategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: csi-s3-provisioner
    spec:
      serviceAccountName: csi-s3-provisioner-sa
      restartPolicy: Always

      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
        - key: CriticalAddonsOnly
          operator: Exists

      containers:
        - name: csi-provisioner
          image: 10.224.146.200/d1tlaisec_01/yunwei/csi-s3/csi-s3:0.43.4
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --v=4
          env:
            - name: ADDRESS
              value: /var/lib/kubelet/plugins/ru.yandex.s3.csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/kubelet/plugins/ru.yandex.s3.csi

        - name: csi-s3
          image: 10.224.146.200/d1tlaisec_01/yunwei/csi-s3/csi-s3:0.43.4
          imagePullPolicy: IfNotPresent
          args:
            - --endpoint=$(CSI_ENDPOINT)
            - --nodeid=$(NODE_ID)
            - --v=4
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/kubelet/plugins/ru.yandex.s3.csi/csi.sock
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/kubelet/plugins/ru.yandex.s3.csi

      volumes:
        - name: socket-dir
          emptyDir: {}
