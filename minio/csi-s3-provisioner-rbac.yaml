# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-s3-provisioner-sa
  namespace: kube-system
---
# ClusterRoleBinding - 绑定到已存在的 csi-s3-external-provisioner-runner
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-s3-provisioner-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: csi-s3-external-provisioner-runner
subjects:
  - kind: ServiceAccount
    name: csi-s3-provisioner-sa
    namespace: kube-system
