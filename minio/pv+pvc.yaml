apiVersion: v1
kind: Namespace
metadata:
  name: bigdata-dp
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-task-versions
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  storageClassName: csi-s3
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  csi:
    driver: ru.yandex.s3.csi
    volumeHandle: task-versions-pvc
    controllerPublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodeStageSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    volumeAttributes:
      capacity: 10Gi
      mounter: geesefs
      options: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-nfs-data
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  storageClassName: csi-s3
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  csi:
    driver: ru.yandex.s3.csi
    volumeHandle: nfs-data-pvc
    controllerPublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodeStageSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    volumeAttributes:
      capacity: 20Gi
      mounter: geesefs
      options: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-worker-logs
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  storageClassName: csi-s3
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  csi:
    driver: ru.yandex.s3.csi
    volumeHandle: worker-logs-pvc
    controllerPublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodeStageSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: kube-system
    volumeAttributes:
      capacity: 10Gi
      mounter: geesefs
      options: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: task-versions-pvc
  namespace: bigdata-dp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: pv-task-versions
  storageClassName: ""
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-data-pvc
  namespace: bigdata-dp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  volumeName: pv-nfs-data
  storageClassName: "cis-s3"
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: worker-logs-pvc
  namespace: bigdata-dp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: pv-worker-logs
  storageClassName: ""
  volumeMode: Filesystem
